<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MindNest — V1 Prototype</title>
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="tablet.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #E5E8E1; overflow: hidden; }
  #root { height: 100vh; }
  .boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #E5E8E1; }
  .boot span { width: 30px; height: 30px; border-radius: 50%; border: 3px solid rgba(92,124,69,0.25); border-top-color: #5C7C45; animation: spin .9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"><div class="boot"><span></span></div></div>

<template id="__bundler_thumbnail" data-bg-color="#E5E8E1">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="tbg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#7C9D6B"/>
        <stop offset="1" stop-color="#5C7C45"/>
      </linearGradient>
    </defs>
    <rect x="470" y="290" width="260" height="260" rx="64" fill="url(#tbg)"/>
    <path d="M600 360c-44 22-70 64-70 112 0 8 1 16 3 24 6-44 34-78 74-96-30 24-48 60-48 100 38-6 70-30 86-64 10-22 13-48 9-76-18-6-39-7-54-0z" fill="#fff" opacity="0.95"/>
    <path d="M600 540v-92" stroke="#fff" stroke-width="10" stroke-linecap="round" opacity="0.95"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="frames/ios-frame.jsx"></script>

<script type="text/babel" data-presets="react">
  (function mount() {
    if (typeof App === 'undefined' || !window.App) { setTimeout(mount, 30); return; }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  })();
</script>
