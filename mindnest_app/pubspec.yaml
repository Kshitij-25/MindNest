publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.0.10+1
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.2.3
  google_fonts: ^6.2.1
  injectable: ^3.0.0
  json_annotation: ^4.12.0
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  injectable_generator: ^3.0.2
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
